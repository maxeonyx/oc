name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce version bump on new main commits
        run: python scripts/check-version-bump.py

      - name: Read Rust toolchain channel
        id: rust-toolchain
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as toolchain_toml:
              channel = tomllib.load(toolchain_toml)["toolchain"]["channel"]

          print(f"channel={channel}")
          PY

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install cargo-nextest
        run: cargo install cargo-nextest@0.9.114 --locked

      - name: Install tdd-ratchet
        run: cargo install --git https://github.com/maxeonyx/tdd-ratchet-rs --rev 3b9aec65458d2c038c34f4dc441a1e26e0700c97 --locked tdd-ratchet

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tdd-ratchet
        run: cargo ratchet

      - name: Check status file unchanged
        run: |
          if ! git diff --exit-code .test-status.json; then
            echo "::error::Test status changed. Commit the updated .test-status.json"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v6

      - name: Read Rust toolchain channel
        id: rust-toolchain
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as toolchain_toml:
              channel = tomllib.load(toolchain_toml)["toolchain"]["channel"]

          print(f"channel={channel}")
          PY

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare asset
        run: cp target/x86_64-unknown-linux-gnu/release/oc oc-x86_64-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: oc-x86_64-linux
          path: oc-x86_64-linux
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Read version from Cargo.toml
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("Cargo.toml", "rb") as cargo_toml:
              version = tomllib.load(cargo_toml)["package"]["version"]

          print(f"tag=v{version}")
          PY

      - name: Recreate release for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes --cleanup-tag
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git push origin ":refs/tags/$tag"
          fi

          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --target "$GITHUB_SHA" \
            artifacts/*

  pages:
    name: Pages
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Prepare site content
        run: |
          rm -rf _site
          mkdir -p _site/releases
          cp -R docs/. _site/
          cp artifacts/* _site/releases/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
